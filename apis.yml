aid: nuclino
name: Nuclino
description: >-
  Nuclino is a unified team workspace that combines wikis, docs, and project
  management into one collaborative platform. Its REST API enables developers
  to build integrations and automate tasks by programmatically managing items,
  collections, workspaces, teams, users, fields, and files using Markdown
  content. The API covers the full content lifecycle — create, read, update,
  delete, and search — making it possible to sync knowledge bases with external
  systems, trigger content updates from CI/CD pipelines, and build custom
  tooling on top of team documentation.
