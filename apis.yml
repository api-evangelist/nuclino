apis:
  - aid: nuclino:nuclino-api
    name: Nuclino API
    description: >-
      REST API for the Nuclino unified team workspace. Provides programmatic
      access to items (wiki pages), collections (page groups), workspaces,
      teams, users, fields, and files. All content is authored and returned in
      Markdown. Supports full CRUD on items and collections, full-text search,
      cursor-based pagination, and file download.
    humanURL: https://www.nuclino.com/api
