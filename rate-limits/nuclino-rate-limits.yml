name: Nuclino API Rate Limits
description: >-
  The Nuclino REST API enforces rate limits to ensure platform stability and
  a consistent experience for all users. Limits are applied per API key.
  When a limit is exceeded, the API returns HTTP 429 and includes headers
  to guide retry behavior.
url: https://help.nuclino.com/b147124e-rate-limiting
created: '2026-06-13'
modified: '2026-06-13'
limits:
  - name: Requests per Minute
    description: >-
      Maximum number of API requests allowed per API key within a 60-second
      window. Exceeding this limit returns a 429 Too Many Requests response.
    limit: 150
    period: minute
    scope: per API key
    httpStatus: 429
    headers:
      - name: X-RateLimit-Limit
        description: The maximum number of requests allowed per minute for this key.
      - name: X-RateLimit-Remaining
        description: The number of requests remaining in the current rate-limit window.
      - name: X-RateLimit-Reset
        description: Unix timestamp indicating when the current rate-limit window resets.
      - name: Retry-After
        description: Seconds to wait before making another request after being rate-limited.
pagination:
  method: cursor
  parameter: after
  defaultPageSize: 24
  maxPageSize: 100
  description: >-
    List endpoints use cursor-based pagination. Pass the id of the last
    returned object as the `after` query parameter to fetch the next page.
    The default page size is 24 records; the maximum is 100.
notes:
  - Rate limits apply per API key, not per IP address or account.
  - Implement exponential backoff when handling 429 responses.
  - Monitor X-RateLimit-Remaining proactively to avoid hitting the limit.
  - Webhooks are not currently available; polling is required for change detection.
