name: Nuclino Plans and Pricing
description: >-
  Nuclino offers three pricing tiers — Free, Starter, and Business — with
  per-user monthly pricing and a 25% discount for annual billing. All plans
  include REST API access. The Business plan adds AI (Sidekick), audit logs,
  team insights, and advanced security controls.
url: https://www.nuclino.com/pricing
created: '2026-06-13'
modified: '2026-06-13'
plans:
  - name: Free
    description: >-
      Free plan for small teams getting started. Limited to 50 items and 2 GB
      total storage. Includes core wiki and documentation features with REST
      API access.
    price: 0
    currency: USD
    billingCycle: monthly
    url: https://www.nuclino.com/pricing
    features:
      - Up to 50 items
      - 2 GB total storage
      - Collaborative wiki and docs
      - Canvas feature
      - REST API access
      - Unlimited members
  - name: Starter
    description: >-
      Paid plan for growing teams needing unlimited content and longer version
      history. Unlocks unlimited items, canvases, and 10 GB per-user storage
      with 30-day version history.
    price: 6
    currency: USD
    unit: user/month
    billingCycle: monthly
    annualPrice: 4.50
    annualBillingCycle: yearly
    url: https://www.nuclino.com/pricing
    features:
      - Unlimited items
      - Unlimited canvases
      - 10 GB storage per user
      - 30-day version history
      - REST API access
      - All Free plan features
  - name: Business
    description: >-
      Full-featured plan for organizations requiring AI assistance, security
      controls, and team analytics. Includes Sidekick AI, audit log, team
      insights, and advanced security options.
    price: 10
    currency: USD
    unit: user/month
    billingCycle: monthly
    annualPrice: 7.50
    annualBillingCycle: yearly
    url: https://www.nuclino.com/pricing
    features:
      - Everything in Starter
      - Sidekick (AI assistant)
      - Audit log
      - Team insights and analytics
      - Advanced security controls
      - REST API access
      - Teams management via API
notes:
  - A 25% discount applies to all paid plans when billed annually.
  - Teams endpoint (GET /v0/workspaces/{workspaceId}/teams) is available on paid plans.
  - API keys can be generated by any user on any plan including Free.
